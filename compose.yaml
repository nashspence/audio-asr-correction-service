services:
  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_TOKEN: ${HF_TOKEN}
    command:
      - ${QWEN_MODEL}
      - --served-model-name
      - ${SERVED_MODEL_NAME}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --quantization
      - ${VLLM_QUANTIZATION}
      - --dtype
      - half
      - --trust-remote-code
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION}
      - --cpu-offload-gb
      - ${VLLM_CPU_OFFLOAD_GB}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN}
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS}
      - --tensor-parallel-size
      - ${VLLM_TENSOR_PARALLEL_SIZE}
      - --download-dir
      - /root/.cache/huggingface
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); sys.exit(0)"
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
    volumes:
      - ${MODEL_CACHE_HOST_DIR:-./.cache/models/huggingface}:/root/.cache/huggingface
    gpus: all

  corrector:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    environment:
      OPENAI_BASE_URL: http://vllm:8000/v1
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN}
      CORRECTION_MODEL_CONTEXT_TOKENS: ${CORRECTION_MODEL_CONTEXT_TOKENS}
      CORRECTION_TOKEN_MARGIN: ${CORRECTION_TOKEN_MARGIN}
      CORRECTION_OVERLAP_TOKENS: ${CORRECTION_OVERLAP_TOKENS}
      CORRECTION_MIN_COMPLETION_TOKENS: ${CORRECTION_MIN_COMPLETION_TOKENS}
      CORRECTION_FALLBACK_TOKENS_PER_WORD: ${CORRECTION_FALLBACK_TOKENS_PER_WORD}
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - ${APP_PORT:-8080}:8080
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=5); sys.exit(0)"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
